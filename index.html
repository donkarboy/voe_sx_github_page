<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VOE Extractor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:       #0b0d11;
    --surface:  #131720;
    --border:   #1e2535;
    --accent:   #5b8dee;
    --accent2:  #a78bfa;
    --text:     #e4e8f0;
    --muted:    #5a6070;
    --success:  #3ecf8e;
    --warn:     #f5a623;
    --error:    #f56565;
    --radius:   10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  h1 {
    font-size: clamp(1.4rem, 4vw, 1.9rem);
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.88rem;
    margin-top: 4px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    width: 100%;
    max-width: 680px;
  }

  /* ── Input row ── */
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  button {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: #fff;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 11px 22px;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  button:hover { opacity: 0.88; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Log / status ── */
  .log-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.7;
    max-height: 200px;
    overflow-y: auto;
    padding: 14px;
    display: none;
  }
  .log-box.visible { display: block; }
  .log-line { display: flex; gap: 8px; }
  .log-line .ts  { color: var(--muted); min-width: 55px; }
  .log-line.info  .msg { color: var(--text); }
  .log-line.ok    .msg { color: var(--success); }
  .log-line.warn  .msg { color: var(--warn); }
  .log-line.error .msg { color: var(--error); }

  /* ── Result ── */
  .result-box {
    margin-top: 20px;
    display: none;
  }
  .result-box.visible { display: block; }

  .result-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .result-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: stretch;
  }
  .result-url {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--success);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 10px 13px;
    word-break: break-all;
    line-height: 1.5;
  }
  .copy-btn {
    background: var(--border);
    border-radius: var(--radius);
    font-size: 0.8rem;
    padding: 10px 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    flex-shrink: 0;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .action-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 6px;
  }
  .action-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 0.8rem;
    padding: 7px 14px;
  }
  .action-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Preview image ── */
  .preview-img {
    margin-top: 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    max-width: 100%;
    display: none;
  }
  .preview-img.visible { display: block; }

  /* ── Proxy badge ── */
  .proxy-badge {
    display: inline-block;
    background: #1a2035;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    padding: 3px 8px;
    margin-top: 14px;
  }
  .proxy-badge span { color: var(--accent); }

  /* ── Divider ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo-icon">⚡</div>
    <h1>VOE Extractor</h1>
  </div>
  <p class="subtitle">Extract direct HLS/MP4 stream URLs from VOE embed links</p>
</header>

<div class="card">
  <div class="input-row">
    <input type="text" id="voeInput" placeholder="https://voe.sx/e/xxxxxxxx" />
    <button id="extractBtn" onclick="startExtract()">Extract</button>
  </div>

  <div class="log-box" id="logBox"></div>

  <div class="result-box" id="resultBox">
    <hr class="divider" />
    <div class="result-label">Direct Stream URL</div>
    <div class="result-row">
      <div class="result-url" id="directUrl"></div>
      <button class="copy-btn" onclick="copyUrl('directUrl')" title="Copy">⎘ Copy</button>
    </div>
    <div class="action-row">
      <button class="action-btn" onclick="openInNewTab()">↗ Open URL</button>
      <button class="action-btn" onclick="copyMpv()">🖥 Copy mpv cmd</button>
    </div>
    <img class="preview-img" id="previewImg" alt="Preview" />
    <div class="proxy-badge">via proxy: <span id="proxyUsed">—</span></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  PROXY CHAIN
// ─────────────────────────────────────────────
const PROXIES = [
  // Primary: your own Cloudflare Worker
  { name: "foxy-doxy (CF)",    wrap: url => `https://foxy-doxy.andruilsyestems.workers.dev/?url=${encodeURIComponent(url)}` },
  // Public CORS proxies as fallbacks
  { name: "allorigins",        wrap: url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
  { name: "corsproxy.io",      wrap: url => `https://corsproxy.io/?${encodeURIComponent(url)}` },
  { name: "cors.sh",           wrap: url => `https://cors.sh/${url}` },
  { name: "htmldriven",        wrap: url => `https://cors-proxy.htmldriven.com/?url=${encodeURIComponent(url)}` },
];

// ─────────────────────────────────────────────
//  DECODING PIPELINE  (mirrors the Python)
// ─────────────────────────────────────────────
const JUNK_PARTS = ["@$", "^^", "~@", "%?", "*~", "!!", "#&"];

function shiftLetters(s) {
  return s.split('').map(c => {
    const code = c.charCodeAt(0);
    if (code >= 65 && code <= 90)  return String.fromCharCode((code - 65 + 13) % 26 + 65);
    if (code >= 97 && code <= 122) return String.fromCharCode((code - 97 + 13) % 26 + 97);
    return c;
  }).join('');
}

function replaceJunk(s) {
  for (const j of JUNK_PARTS) s = s.split(j).join('_');
  return s;
}

function shiftBack(s, n) {
  return s.split('').map(c => String.fromCharCode(c.charCodeAt(0) - n)).join('');
}

function b64decode(s) {
  // atob only handles ASCII; handle URL-safe variants
  s = s.replace(/-/g, '+').replace(/_/g, '/');
  while (s.length % 4) s += '=';
  return atob(s);
}

function decodeVoeString(encoded) {
  const step1 = shiftLetters(encoded);
  const step2 = replaceJunk(step1).split('_').join('');
  const step3 = b64decode(step2);
  const step4 = shiftBack(step3, 3);
  const step5 = b64decode(step4.split('').reverse().join(''));
  return JSON.parse(step5);
}

function extractVoeSource(html) {
  const re = /<script\s+type=["']application\/json["']>([\s\S]*?)<\/script>/g;
  let m;
  while ((m = re.exec(html)) !== null) {
    let encoded = m[1].trim();
    if (encoded.startsWith('"') && encoded.endsWith('"'))
      encoded = encoded.slice(1, -1);
    // unescape JSON unicode escapes
    try { encoded = JSON.parse('"' + encoded + '"'); } catch(_) {}
    try {
      const decoded = decodeVoeString(encoded);
      if (decoded && decoded.source) return decoded.source;
    } catch(_) { continue; }
  }
  return null;
}

// ─────────────────────────────────────────────
//  LOGGING
// ─────────────────────────────────────────────
const logBox = document.getElementById('logBox');

function log(msg, type = 'info') {
  logBox.classList.add('visible');
  const now = new Date();
  const ts = now.toTimeString().slice(0, 8);
  const line = document.createElement('div');
  line.className = `log-line ${type}`;
  line.innerHTML = `<span class="ts">${ts}</span><span class="msg">${msg}</span>`;
  logBox.appendChild(line);
  logBox.scrollTop = logBox.scrollHeight;
}

function clearLog() {
  logBox.innerHTML = '';
  logBox.classList.remove('visible');
}

// ─────────────────────────────────────────────
//  FETCH THROUGH PROXY CHAIN
// ─────────────────────────────────────────────
async function fetchViaProxies(targetUrl) {
  const errors = [];
  for (const proxy of PROXIES) {
    const proxyUrl = proxy.wrap(targetUrl);
    log(`Trying proxy: ${proxy.name} …`, 'warn');
    try {
      const resp = await fetch(proxyUrl, {
        headers: {
          'Accept': 'text/html,application/xhtml+xml,*/*;q=0.8',
          'Accept-Language': 'en-US,en;q=0.5',
        },
        signal: AbortSignal.timeout(15000)
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const html = await resp.text();
      if (html.length < 200) throw new Error('Response too short, likely blocked');
      log(`✓ Got response via ${proxy.name} (${html.length} bytes)`, 'ok');
      return { html, proxy };
    } catch (err) {
      log(`✗ ${proxy.name} failed: ${err.message}`, 'error');
      errors.push(`${proxy.name}: ${err.message}`);
    }
  }
  throw new Error('All proxies failed:\n' + errors.join('\n'));
}

// ─────────────────────────────────────────────
//  REDIRECT URL EXTRACTION
// ─────────────────────────────────────────────
function extractRedirectUrl(html) {
  const m = html.match(/https?:\/\/[^'"<>\s]+/);
  return m ? m[0] : null;
}

// ─────────────────────────────────────────────
//  MAIN EXTRACT FLOW
// ─────────────────────────────────────────────
let lastResult = null;

async function startExtract() {
  const input = document.getElementById('voeInput').value.trim();
  if (!input) { alert('Enter a VOE embed URL first.'); return; }

  // Validate
  try { new URL(input); } catch(_) { alert('Not a valid URL.'); return; }

  clearLog();
  document.getElementById('resultBox').classList.remove('visible');
  document.getElementById('previewImg').classList.remove('visible');
  lastResult = null;

  const btn = document.getElementById('extractBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Extracting…';

  try {
    log(`Target: ${input}`, 'info');

    // Step 1: Fetch the embed page
    let { html, proxy } = await fetchViaProxies(input);
    let usedProxy = proxy;

    // Step 2: Try to decode source directly
    let source = extractVoeSource(html);

    // Step 3: Fallback — follow redirect URL found in page
    if (!source) {
      log('No source in embed page, looking for redirect…', 'warn');
      const redirectUrl = extractRedirectUrl(html);
      if (!redirectUrl) throw new Error('No redirect URL found in response HTML.');
      log(`Redirect: ${redirectUrl}`, 'info');
      const second = await fetchViaProxies(redirectUrl);
      html = second.html;
      usedProxy = second.proxy;
      source = extractVoeSource(html);
    }

    if (!source) throw new Error('Could not extract VOE source from page. VOE may have changed their encoding.');

    log(`✓ Source extracted successfully!`, 'ok');
    lastResult = { source, proxy: usedProxy };
    showResult(source, usedProxy.name);

    // Step 4: Attempt preview image (best effort)
    tryPreviewImage(input, usedProxy);

  } catch (err) {
    log(`Fatal: ${err.message}`, 'error');
    alert('Extraction failed.\n\n' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Extract';
  }
}

// ─────────────────────────────────────────────
//  PREVIEW IMAGE
// ─────────────────────────────────────────────
async function tryPreviewImage(embedUrl, proxy) {
  try {
    // VOE preview pattern: replace /e/ with /cache/ and append _storyboard_L2.jpg
    // But we need the redirect URL for that — try to pull it from the current html in mem
    // Quick shortcut: just attempt via the embed slug
    const slug = embedUrl.split('/e/')[1]?.split(/[?#]/)[0];
    if (!slug) return;
    // Common VOE CDN patterns
    const candidates = [
      `https://voe.sx/cache/${slug}_storyboard_L2.jpg`,
      `https://cdn-voe.com/cache/${slug}_storyboard_L2.jpg`,
    ];
    for (const c of candidates) {
      const proxyUrl = proxy.wrap(c);
      try {
        const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
        if (r.ok && r.headers.get('content-type')?.startsWith('image')) {
          const blob = await r.blob();
          const objectUrl = URL.createObjectURL(blob);
          const img = document.getElementById('previewImg');
          img.src = objectUrl;
          img.classList.add('visible');
          break;
        }
      } catch(_) {}
    }
  } catch(_) {}
}

// ─────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────
function showResult(url, proxyName) {
  document.getElementById('directUrl').textContent = url;
  document.getElementById('proxyUsed').textContent = proxyName;
  document.getElementById('resultBox').classList.add('visible');
}

function copyUrl(id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied!');
  });
}

function copyMpv() {
  if (!lastResult) return;
  const cmd = `mpv "${lastResult.source}" --http-header-fields="User-Agent: Mozilla/5.0"`;
  navigator.clipboard.writeText(cmd).then(() => showToast('mpv command copied!'));
}

function openInNewTab() {
  if (!lastResult) return;
  window.open(lastResult.source, '_blank');
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `
      position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
      background:#1e2535;color:#e4e8f0;border:1px solid #5b8dee;
      border-radius:8px;padding:10px 20px;font-family:'Space Grotesk',sans-serif;
      font-size:0.87rem;z-index:9999;transition:opacity 0.3s;
    `;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 1800);
}

// Allow pressing Enter
document.getElementById('voeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startExtract();
});
</script>
</body>
</html>
